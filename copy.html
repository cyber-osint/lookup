<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Quick Share</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; max-width: 450px; margin: 40px auto; padding: 20px; background-color: #f4f7f9; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; font-size: 1.2rem; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background-color: #4A90E2; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #357ABD; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; background: #eee; margin-bottom: 15px; }
        #receivedBox { background: #eef2ff; padding: 15px; border-left: 4px solid #4A90E2; display: none; margin-top: 20px; border-radius: 0 8px 8px 0; }
        .info-text { font-size: 0.85rem; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>P2P 텍스트 공유</h2>
    <div id="status" class="status-badge">상태: 대기 중</div>
    
    <p class="info-text">보내는 사람과 받는 사람 모두 <b>같은 4자리 숫자</b>를 입력하세요.</p>
    <input type="text" id="roomCode" placeholder="숫자 4자리 (예: 7788)" maxlength="4">
    <button id="connectBtn">연결 및 대기하기</button>
    
    <div id="transferSection" style="display:none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
        <textarea id="msgInput" placeholder="보낼 내용을 입력하세요"></textarea>
        <button id="sendBtn">텍스트 전송</button>
    </div>

    <div id="receivedBox">
        <strong style="font-size: 0.9rem;">수신된 내용:</strong>
        <p id="receivedText" style="word-break: break-all; margin: 10px 0;"></p>
        <button onclick="copyText()" style="padding: 5px; background: #666; font-size: 0.8rem;">내용 복사</button>
    </div>
</div>

<script>
    let peer = null;
    let conn = null;

    const connectBtn = document.getElementById('connectBtn');
    const roomInput = document.getElementById('roomCode');
    const statusBadge = document.getElementById('status');
    const transferSection = document.getElementById('transferSection');
    const receivedBox = document.getElementById('receivedBox');

    // 연결 시도
    connectBtn.onclick = () => {
        const code = roomInput.value.trim();
        if (code.length < 4) return alert('4자리 숫자를 입력해주세요.');

        // Peer ID를 'p2p-share-' + 4자리 숫자로 설정 (중복 방지용 접두사)
        const myId = 'p2p-share-' + code;
        
        // Peer 객체 생성
        peer = new Peer(myId);

        statusBadge.innerText = "상태: 연결 준비 중...";
        connectBtn.disabled = true;

        peer.on('open', (id) => {
            statusBadge.innerText = "상태: 수신 대기 중 (코드: " + code + ")";
            statusBadge.style.background = "#d1fae5";
            statusBadge.style.color = "#065f46";
            
            // 누군가 나에게 연결을 시도할 때 (받는 쪽 로직)
            peer.on('connection', (c) => {
                conn = c;
                setupChat();
            });

            // 내가 먼저 연결 시도 (보내는 쪽 로직 - 상대가 이미 대기 중일 때)
            // PeerJS는 동일 ID가 있으면 에러가 나므로, 실제로는 '먼저 들어온 사람'이 서버 역할을 합니다.
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                // 이미 해당 코드로 대기 중인 사람이 있다면, 그 사람에게 연결을 시도합니다.
                conn = peer.connect(myId);
                setupChat();
            } else {
                console.error(err);
                alert("연결 오류가 발생했습니다.");
                location.reload();
            }
        });
    };

    function setupChat() {
        statusBadge.innerText = "상태: 연결됨!";
        statusBadge.style.background = "#dbeafe";
        statusBadge.style.color = "#1e40af";
        transferSection.style.display = "block";

        conn.on('data', (data) => {
            receivedBox.style.display = "block";
            document.getElementById('receivedText').innerText = data;
        });

        conn.on('open', () => {
            // 연결이 완전히 열리면 전송 가능
        });
    }

    // 전송 버튼
    document.getElementById('sendBtn').onclick = () => {
        const msg = document.getElementById('msgInput').value;
        if (!msg || !conn) return alert('내용이 없거나 연결되지 않았습니다.');
        
        conn.send(msg);
        alert('성공적으로 보냈습니다!');
    };

    function copyText() {
        const text = document.getElementById('receivedText').innerText;
        navigator.clipboard.writeText(text).then(() => alert('복사되었습니다.'));
    }
</script>

</body>
</html>
