<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple-Peer P2P</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 350px; text-align: center; }
        .code-display { font-size: 2rem; font-weight: bold; color: var(--primary); letter-spacing: 3px; margin: 20px 0; padding: 10px; background: #eef2ff; border-radius: 12px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; text-align: center; text-transform: uppercase; font-weight: bold; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; font-weight: bold; }
        #status { margin-top: 15px; font-size: 0.85rem; color: #64748b; }
        #transfer-ui { display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .download-btn { display: block; margin-top: 10px; padding: 10px; background: #22c55e; color: white; text-decoration: none; border-radius: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h3>🔗 Simple-Peer 전송</h3>
    <div id="my-code" class="code-display">----</div>
    
    <input type="text" id="target-code" placeholder="상대방 4자리 코드" maxlength="4" oninput="this.value = this.value.toUpperCase()">
    <button id="connect-btn" onclick="startCheck()">연결하기</button>

    <div id="status">시그널링 서버 연결 중...</div>

    <div id="transfer-ui">
        <input type="file" id="file-input">
        <button onclick="sendFile()" style="background: #1e293b; margin-top: 10px;">파일 보내기</button>
    </div>
</div>

<script>
    // 1. 초기 설정 (4자리 코드 및 시그널링 서버)
    const myCode = Math.random().toString(36).substring(2, 6).toUpperCase();
    document.getElementById('my-code').innerText = myCode;

    // 공용 테스트 시그널링 서버 (피어 연결을 도와주는 중계기)
    const socket = io('https://p2p-signaling-server.onrender.com'); 
    let peer = null;

    socket.on('connect', () => {
        document.getElementById('status').innerText = "준비 완료. 상대방을 기다리세요.";
        socket.emit('join-room', myCode);
    });

    // 2. 연결 시작 버튼 클릭 시 (Caller)
    function startCheck() {
        const targetCode = document.getElementById('target-code').value;
        if (!targetCode) return;
        initPeer(true, targetCode);
    }

    // 3. Peer 초기화 함수
    function initPeer(initiator, targetCode) {
        peer = new SimplePeer({
            initiator: initiator,
            trickle: true,
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
        });

        // 상대방에게 보낼 신호 데이터(Signal)가 생성되면 실행
        peer.on('signal', data => {
            socket.emit('signal', {
                target: targetCode,
                sender: myCode,
                signal: data
            });
        });

        // 데이터 채널이 열렸을 때
        peer.on('connect', () => {
            document.getElementById('status').innerText = "✅ P2P 연결 성공!";
            document.getElementById('transfer-ui').style.display = 'block';
            document.getElementById('connect-btn').disabled = true;
        });

        // 데이터를 받았을 때 (파일 수신)
        peer.on('data', data => {
            const parsed = JSON.parse(data);
            const blob = new Blob([new Uint8Array(parsed.file)], { type: parsed.type });
            const url = URL.createObjectURL(blob);
            document.getElementById('status').innerHTML = 
                `<a href="${url}" download="${parsed.name}" class="download-btn">⬇️ ${parsed.name} 받기</a>`;
        });

        peer.on('error', err => console.error('Peer error:', err));
    }

    // 4. 시그널링 서버로부터 신호 수신
    socket.on('signal', data => {
        if (!peer) {
            // 연결 요청을 받은 쪽(Receiver)은 initiator를 false로 초기화
            initPeer(false, data.sender);
        }
        peer.signal(data.signal);
    });

    // 5. 파일 전송 함수
    async function sendFile() {
        const file = document.getElementById('file-input').files[0];
        if (!file) return;

        document.getElementById('status').innerText = "파일 읽는 중...";
        
        const reader = new FileReader();
        reader.onload = () => {
            const payload = {
                name: file.name,
                type: file.type,
                file: Array.from(new Uint8Array(reader.result))
            };
            peer.send(JSON.stringify(payload));
            document.getElementById('status').innerText = "전송 완료!";
        };
        reader.readAsArrayBuffer(file);
    }
</script>

</body>
</html>
