<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P ID 채팅 (ID 표시 버전)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 500px; margin: 20px auto; text-align: center; background: #f0f2f5; color: #333; }
        .status-box { background: #333; color: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        #chat-box { height: 400px; border: 1px solid #ddd; background: white; overflow-y: auto; padding: 15px; margin-bottom: 10px; text-align: left; border-radius: 8px; display: flex; flex-direction: column; }
        
        /* 메시지 스타일 */
        .msg-container { margin: 8px 0; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 75%; font-size: 0.9em; position: relative; }
        .sender-id { font-size: 0.75em; color: #666; margin-bottom: 3px; font-weight: bold; }
        
        /* 내가 보낸 메시지 (오른쪽) */
        .me-container { align-items: flex-end; }
        .me { background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .me-id { text-align: right; color: #007bff; }

        /* 상대방이 보낸 메시지 (왼쪽) */
        .peer-container { align-items: flex-start; }
        .peer { background: #e9e9eb; color: #333; border-bottom-left-radius: 2px; }
        
        /* 시스템 메시지 */
        .system { background: #eee; color: #666; font-size: 0.8em; align-self: center; border-radius: 5px; padding: 4px 10px; margin: 10px 0; }

        .input-group { display: flex; gap: 5px; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #ccc; outline: none; }
        button { padding: 10px 15px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; }
        #connect-btn { background: #17a2b8; }
        .id-setup { background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <h2>P2P Private Chat</h2>

    <div id="setup-area" class="id-setup">
        <p>사용할 닉네임을 정해주세요</p>
        <div class="input-group">
            <input type="text" id="my-custom-id" placeholder="예: user77">
            <button id="start-btn">접속</button>
        </div>
    </div>

    <div id="chat-area" style="display:none;">
        <div class="status-box">내 접속 ID: <span id="display-id"></span></div>

        <div class="input-group">
            <input type="text" id="peer-id-input" placeholder="상대방 ID 입력">
            <button id="connect-btn">연결</button>
        </div>

        <div id="chat-box"></div>

        <div class="input-group">
            <input type="text" id="message-input" placeholder="메시지 입력...">
            <button id="send-btn">전송</button>
        </div>
    </div>

    <script>
        let peer = null;
        let conn = null;
        let myId = "";

        const setupArea = document.getElementById('setup-area');
        const chatArea = document.getElementById('chat-area');
        const myIdInput = document.getElementById('my-custom-id');
        const startBtn = document.getElementById('start-btn');
        const displayId = document.getElementById('display-id');
        const peerIdInput = document.getElementById('peer-id-input');
        const connectBtn = document.getElementById('connect-btn');
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        startBtn.onclick = () => {
            myId = myIdInput.value.trim();
            if (!myId) return alert("ID를 입력하세요.");

            peer = new Peer(myId, {
                host: '0.peerjs.com',
                port: 443,
                secure: true,
                debug: 1
            });

            peer.on('open', (id) => {
                setupArea.style.display = 'none';
                chatArea.style.display = 'block';
                displayId.innerText = id;
                addMessage("시스템", "채팅방 입장 완료", "system");
            });

            peer.on('connection', (connection) => {
                conn = connection;
                setupChatHandlers();
                addMessage("시스템", "상대방(" + conn.peer + ")과 연결되었습니다!", "system");
            });

            peer.on('error', (err) => {
                if (err.type === 'id-taken') alert("이미 사용 중인 ID입니다.");
                else alert("에러: " + err.type);
                location.reload();
            });
        };

        connectBtn.onclick = () => {
            const remoteId = peerIdInput.value.trim();
            if (!remoteId) return alert("상대방 ID를 입력하세요.");
            conn = peer.connect(remoteId);
            setupChatHandlers();
        };

        function setupChatHandlers() {
            conn.on('open', () => {
                addMessage("시스템", "상대방(" + conn.peer + ")에게 연결되었습니다.", "system");
            });

            conn.on('data', (data) => {
                addMessage(conn.peer, data, "peer"); // 상대방 ID 표시
            });
        }

        function sendMessage() {
            const msg = messageInput.value.trim();
            if (!msg || !conn) return;
            conn.send(msg);
            addMessage(myId, msg, "me"); // 내 ID 표시
            messageInput.value = "";
        }

        sendBtn.onclick = sendMessage;
        messageInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        function addMessage(sender, text, type) {
            if (type === 'system') {
                const div = document.createElement('div');
                div.className = "msg system";
                div.innerText = text;
                chatBox.appendChild(div);
            } else {
                // 메시지 컨테이너 생성
                const container = document.createElement('div');
                container.className = `msg-container ${type}-container`;

                // ID 라벨 생성
                const idLabel = document.createElement('div');
                idLabel.className = `sender-id ${type}-id`;
                idLabel.innerText = sender;

                // 메시지 말풍선 생성
                const msgDiv = document.createElement('div');
                msgDiv.className = `msg ${type}`;
                msgDiv.innerText = text;

                container.appendChild(idLabel);
                container.appendChild(msgDiv);
                chatBox.appendChild(container);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
