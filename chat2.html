<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P 커스텀 ID 채팅</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 500px; margin: 20px auto; text-align: center; background: #f0f2f5; color: #333; }
        .status-box { background: #333; color: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        #chat-box { height: 350px; border: 1px solid #ddd; background: white; overflow-y: auto; padding: 15px; margin-bottom: 10px; text-align: left; border-radius: 8px; display: flex; flex-direction: column; }
        .msg { margin: 5px 0; padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 0.9em; }
        .me { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .peer { background: #e9e9eb; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .system { background: #eee; color: #666; font-size: 0.8em; align-self: center; border-radius: 5px; padding: 5px 10px; }
        .input-group { display: flex; gap: 5px; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #ccc; outline: none; }
        button { padding: 10px 15px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #connect-btn { background: #17a2b8; }
        .id-setup { background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2>P2P Private Chat</h2>

    <div id="setup-area" class="id-setup">
        <p>사용할 짧은 닉네임을 정해주세요</p>
        <div class="input-group">
            <input type="text" id="my-custom-id" placeholder="예: tom123">
            <button id="start-btn">접속하기</button>
        </div>
    </div>

    <div id="chat-area" style="display:none;">
        <div class="status-box">
            내 접속 ID: <span id="display-id"></span>
        </div>

        <div class="input-group">
            <input type="text" id="peer-id-input" placeholder="상대방 ID 입력">
            <button id="connect-btn">연결</button>
        </div>

        <div id="chat-box"></div>

        <div class="input-group">
            <input type="text" id="message-input" placeholder="메시지 입력...">
            <button id="send-btn">전송</button>
        </div>
    </div>

    <script>
        let peer = null;
        let conn = null;

        const setupArea = document.getElementById('setup-area');
        const chatArea = document.getElementById('chat-area');
        const myIdInput = document.getElementById('my-custom-id');
        const startBtn = document.getElementById('start-btn');
        const displayId = document.getElementById('display-id');
        
        const peerIdInput = document.getElementById('peer-id-input');
        const connectBtn = document.getElementById('connect-btn');
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        // 1. 접속 버튼 클릭 시 Peer 객체 생성
        startBtn.onclick = () => {
            const customId = myIdInput.value.trim();
            if (!customId) return alert("ID를 입력하세요.");

            // PeerJS 초기화 (HTTPS 설정 포함)
            peer = new Peer(customId, {
                host: '0.peerjs.com',
                port: 443,
                secure: true,
                debug: 1
            });

            // ID 생성 성공
            peer.on('open', (id) => {
                setupArea.style.display = 'none';
                chatArea.style.display = 'block';
                displayId.innerText = id;
                addMessage("시스템", "채팅방에 입장했습니다.", "system");
            });

            // 상대방이 연결해 올 때
            peer.on('connection', (connection) => {
                conn = connection;
                setupChatHandlers();
                addMessage("시스템", "상대방과 연결되었습니다!", "system");
            });

            // 에러 처리 (ID 중복 등)
            peer.on('error', (err) => {
                if (err.type === 'id-taken') {
                    alert("이미 사용 중인 ID입니다. 다른 ID를 입력해주세요.");
                } else {
                    alert("에러 발생: " + err.type);
                }
                location.reload(); // 에러 시 초기화
            });
        };

        // 2. 내가 상대방에게 연결 시도
        connectBtn.onclick = () => {
            const remoteId = peerIdInput.value.trim();
            if (!remoteId) return alert("상대방 ID를 입력하세요.");
            
            conn = peer.connect(remoteId);
            setupChatHandlers();
        };

        // 3. 채팅 이벤트 핸들러
        function setupChatHandlers() {
            conn.on('open', () => {
                addMessage("시스템", "상대방이 연결을 수락했습니다.", "system");
            });

            conn.on('data', (data) => {
                addMessage("상대방", data, "peer");
            });

            conn.on('close', () => {
                addMessage("시스템", "연결이 종료되었습니다.", "system");
            });
        }

        // 4. 메시지 전송
        function sendMessage() {
            const msg = messageInput.value.trim();
            if (!msg || !conn) return;
            
            conn.send(msg);
            addMessage("나", msg, "me");
            messageInput.value = "";
        }

        sendBtn.onclick = sendMessage;
        messageInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        function addMessage(sender, text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = type === 'system' ? text : `<strong>${sender}:</strong> ${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
