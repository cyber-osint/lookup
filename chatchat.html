<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P Private Chat</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0d0d10;
  --surface:   #17171c;
  --surface2:  #1e1e26;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --accent:    #7c6af7;
  --accent2:   #a99cf9;
  --accent-bg: rgba(124,106,247,0.12);
  --text:      #f0f0f5;
  --muted:     #7a7a8c;
  --muted2:    #4a4a58;
  --me-bg:     #7c6af7;
  --peer-bg:   #23232e;
  --peer-text: #e8e8f0;
  --sys-bg:    rgba(255,255,255,0.04);
  --font:      'DM Sans', 'Malgun Gothic', sans-serif;
  --mono:      'DM Mono', 'Courier New', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 16px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 55% 45% at 15% 8%, rgba(124,106,247,0.09) 0%, transparent 60%),
    radial-gradient(ellipse 40% 35% at 85% 92%, rgba(124,106,247,0.06) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 460px;
}

/* ── 셋업 ── */
#setup-area {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 24px;
  padding: 48px 36px 40px;
  text-align: center;
  animation: fadeUp 0.4s ease both;
}

.setup-icon {
  width: 60px; height: 60px;
  border-radius: 20px;
  background: var(--accent-bg);
  border: 1px solid rgba(124,106,247,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
}
.setup-icon svg { width: 28px; height: 28px; }

#setup-area h1 {
  font-size: 1.55rem;
  font-weight: 500;
  letter-spacing: -0.025em;
  color: var(--text);
  margin-bottom: 8px;
}
#setup-area .sub {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 32px;
  line-height: 1.6;
}

.field { display: flex; gap: 10px; }

input[type=text] {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 13px 16px;
  font-family: var(--font);
  font-size: 0.9rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  min-width: 0;
}
input::placeholder { color: var(--muted2); }
input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
}
input:disabled { opacity: 0.3; cursor: not-allowed; }

button {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 13px 22px;
  font-family: var(--font);
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.01em;
  flex-shrink: 0;
}
button:hover:not(:disabled) { opacity: 0.85; }
button:active:not(:disabled) { transform: scale(0.97); }
button:disabled { opacity: 0.28; cursor: not-allowed; }

/* ── 채팅 화면 ── */
#chat-area {
  display: none;
  flex-direction: column;
  height: calc(100vh - 32px);
  max-height: 720px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 24px;
  overflow: hidden;
  animation: fadeUp 0.35s ease both;
}

/* 헤더 */
.chat-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.h-avatar {
  width: 38px; height: 38px;
  border-radius: 11px;
  background: var(--accent-bg);
  border: 1px solid rgba(124,106,247,0.25);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--accent2);
  flex-shrink: 0;
  text-transform: uppercase;
}
.h-info { flex: 1; min-width: 0; }
.h-name {
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text);
  font-family: var(--mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.h-sub {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 2px;
  transition: color 0.3s;
}
.status-pip {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--muted2);
  flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}
.status-pip.on {
  background: #4ade80;
  box-shadow: 0 0 7px rgba(74,222,128,0.55);
}

/* 연결바 */
.conn-bar {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
  flex-shrink: 0;
}
.conn-bar input {
  font-size: 0.84rem;
  padding: 9px 14px;
  border-radius: 10px;
}
.conn-bar button {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--accent2);
  padding: 9px 18px;
  border-radius: 10px;
  font-size: 0.82rem;
}
.conn-bar button:hover:not(:disabled) {
  background: var(--accent-bg);
  border-color: rgba(124,106,247,0.5);
}

/* 메시지 영역 */
#chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  gap: 0;
  scroll-behavior: smooth;
}
#chat-box::-webkit-scrollbar { width: 3px; }
#chat-box::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 4px; }

/* 빈 상태 */
.empty-hint {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 10px;
  color: var(--muted2);
  pointer-events: none;
  user-select: none;
  padding: 40px 0;
}
.empty-hint svg { width: 36px; height: 36px; opacity: 0.35; }
.empty-hint span { font-size: 0.8rem; }

/* 말풍선 그룹 */
.msg-grp {
  display: flex;
  flex-direction: column;
  margin: 5px 0;
}
.msg-grp.me  { align-items: flex-end; }
.msg-grp.peer { align-items: flex-start; }

.sndr {
  font-size: 0.67rem;
  color: var(--muted);
  padding: 0 5px;
  margin-bottom: 4px;
  font-family: var(--mono);
}
.me .sndr { color: var(--accent2); }

.bbl {
  max-width: 78%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 0.875rem;
  line-height: 1.5;
  word-break: break-word;
  animation: pop 0.18s cubic-bezier(.34,1.56,.64,1) both;
}
.me .bbl {
  background: var(--me-bg);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.peer .bbl {
  background: var(--peer-bg);
  color: var(--peer-text);
  border-bottom-left-radius: 4px;
  border: 1px solid var(--border);
}

.ts {
  font-size: 0.64rem;
  color: var(--muted2);
  padding: 0 5px;
  margin-top: 3px;
}
.me .ts { text-align: right; }

/* 시스템 */
.sys {
  align-self: center;
  font-size: 0.7rem;
  color: var(--muted);
  background: var(--sys-bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 14px;
  margin: 10px auto;
  text-align: center;
  max-width: 88%;
}

/* 입력 */
.input-wrap {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.input-wrap input {
  flex: 1;
  border-radius: 14px;
  padding: 12px 16px;
  font-size: 0.88rem;
}

#send-btn {
  width: 44px; height: 44px;
  border-radius: 12px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#send-btn svg { width: 17px; height: 17px; }

/* 애니메이션 */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pop {
  from { opacity: 0; transform: scale(0.9) translateY(4px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
</style>
</head>
<body>
<div class="app">

<!-- 셋업 화면 -->
<div id="setup-area">
  <div class="setup-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#7c6af7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
  </div>
  <h1>Private Chat</h1>
  <p class="sub">서버를 거치지 않는 P2P 직접 연결<br>메시지는 오직 두 사람 사이에만 존재합니다</p>
  <div class="field">
    <input type="text" id="my-id-input" placeholder="닉네임 입력" maxlength="30" autocomplete="off" spellcheck="false">
    <button id="start-btn">시작</button>
  </div>
</div>

<!-- 채팅 화면 -->
<div id="chat-area">

  <div class="chat-header">
    <div class="h-avatar" id="my-avatar">??</div>
    <div class="h-info">
      <div class="h-name" id="display-id">—</div>
      <div class="h-sub" id="conn-label">미연결</div>
    </div>
    <div class="status-pip" id="status-pip"></div>
  </div>

  <div class="conn-bar">
    <input type="text" id="peer-id-input" placeholder="상대방 ID 입력" autocomplete="off" spellcheck="false">
    <button id="connect-btn">연결</button>
  </div>

  <div id="chat-box">
    <div class="empty-hint" id="empty-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>아직 메시지가 없습니다</span>
    </div>
  </div>

  <div class="input-wrap">
    <input type="text" id="message-input" placeholder="메시지 입력…" disabled autocomplete="off">
    <button id="send-btn" disabled title="전송 (Enter)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</div>
</div>

<script>
let peer = null, conn = null, myId = "";
let lastPeerId = "", reconnecting = false, connHandlersBound = false;

const setupArea    = document.getElementById('setup-area');
const chatArea     = document.getElementById('chat-area');
const myIdInput    = document.getElementById('my-id-input');
const startBtn     = document.getElementById('start-btn');
const displayId    = document.getElementById('display-id');
const myAvatar     = document.getElementById('my-avatar');
const connLabel    = document.getElementById('conn-label');
const statusPip    = document.getElementById('status-pip');
const peerIdInput  = document.getElementById('peer-id-input');
const connectBtn   = document.getElementById('connect-btn');
const chatBox      = document.getElementById('chat-box');
const emptyHint    = document.getElementById('empty-hint');
const messageInput = document.getElementById('message-input');
const sendBtn      = document.getElementById('send-btn');

/* ── 접속 ── */
function startPeer() {
  const rawId = myIdInput.value.trim();
  if (!rawId) { myIdInput.focus(); return; }
  startBtn.disabled = true;
  startBtn.textContent = "…";

  peer = new Peer(rawId, { host: '0.peerjs.com', port: 443, secure: true, debug: 0 });

  peer.on('open', (id) => {
    myId = id;
    reconnecting = false;
    setupArea.style.display = 'none';
    chatArea.style.display = 'flex';
    displayId.textContent = id;
    myAvatar.textContent = id.slice(0, 2).toUpperCase();
    addSys("연결 준비 완료 · 상대방 ID를 입력하거나 내 ID를 공유하세요");
  });

  peer.on('connection', (inc) => {
    if (conn && conn.open) { inc.close(); addSys("이미 연결 중 — 새 요청 거절됨"); return; }
    conn = inc;
    lastPeerId = conn.peer;
    connHandlersBound = false;
    if (conn.open) { addSys(`${conn.peer}과(와) 연결되었습니다`); bindHandlers(false); }
    else conn.on('open', () => { addSys(`${conn.peer}과(와) 연결되었습니다`); bindHandlers(false); });
  });

  peer.on('error', (err) => {
    if (err.type === 'id-taken') {
      alert("이미 사용 중인 닉네임입니다.");
      startBtn.disabled = false; startBtn.textContent = "시작";
    } else if (err.type === 'peer-unavailable') {
      addSys("상대방을 찾을 수 없습니다 — ID를 확인해 주세요");
      resetConn();
    } else { addSys(`오류: ${err.type}`); }
  });

  peer.on('disconnected', () => {
    if (peer.destroyed) return;
    reconnecting = true;
    addSys("서버 연결이 끊어졌습니다 — 재접속 중…");
    setTimeout(() => { if (!peer.destroyed) peer.reconnect(); }, 1500);
  });
}

startBtn.onclick = startPeer;
myIdInput.onkeydown = (e) => { if (e.key === 'Enter') startPeer(); };

/* ── 발신 측 연결 ── */
function connectToPeer() {
  const remoteId = peerIdInput.value.trim();
  if (!remoteId) { peerIdInput.focus(); return; }
  if (remoteId === myId) { addSys("자기 자신에게는 연결할 수 없습니다"); return; }
  if (conn && conn.open) { addSys("이미 연결 중입니다"); return; }

  connectBtn.disabled = true;
  connectBtn.textContent = "…";
  connLabel.textContent = `${remoteId}에 연결 중…`;
  addSys(`${remoteId}에 연결을 시도합니다…`);

  lastPeerId = remoteId;
  connHandlersBound = false;
  conn = peer.connect(remoteId, { reliable: true, serialization: 'json' });
  bindHandlers(true);
}

connectBtn.onclick = connectToPeer;
peerIdInput.onkeydown = (e) => { if (e.key === 'Enter') connectToPeer(); };

/* ── 핸들러 ── */
function bindHandlers(isInitiator) {
  if (connHandlersBound) return;
  connHandlersBound = true;

  if (isInitiator) {
    conn.on('open', () => { addSys(`${conn.peer}과(와) 연결되었습니다`); setConnected(true); });
  } else {
    setConnected(true);
  }

  conn.on('data', (data) => {
    addMsg(conn.peer, typeof data === 'string' ? data : JSON.stringify(data), 'peer');
  });
  conn.on('close', () => { addSys("상대방이 연결을 종료했습니다"); resetConn(); });
  conn.on('error', (err) => { addSys("연결 오류: " + (err.message || err.type)); resetConn(); });
}

/* ── UI 상태 ── */
function setConnected(yes) {
  messageInput.disabled = !yes;
  sendBtn.disabled      = !yes;
  connectBtn.disabled   = yes;
  connectBtn.textContent = "연결";
  peerIdInput.disabled  = yes;
  statusPip.className   = 'status-pip' + (yes ? ' on' : '');
  connLabel.textContent = yes ? `${conn.peer}과(와) 연결됨` : '미연결';
  if (yes) messageInput.focus();
}

function resetConn() {
  conn = null; connHandlersBound = false; lastPeerId = "";
  setConnected(false);
  peerIdInput.value = ""; peerIdInput.disabled = false; connectBtn.disabled = false;
}

/* ── 전송 ── */
function sendMessage() {
  const msg = messageInput.value.trim();
  if (!msg) return;
  if (!conn || !conn.open) { addSys("연결 상태가 아닙니다"); return; }
  try {
    conn.send(msg);
    addMsg(myId, msg, 'me');
    messageInput.value = "";
  } catch(e) { addSys("전송 실패: " + e.message); }
}

sendBtn.onclick = sendMessage;
messageInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) sendMessage(); };

/* ── 렌더링 ── */
function ts() {
  return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
}

function addMsg(sender, text, type) {
  emptyHint.style.display = 'none';
  const grp = document.createElement('div');
  grp.className = `msg-grp ${type}`;

  const sndr = document.createElement('div');
  sndr.className = 'sndr';
  sndr.textContent = sender;

  const bbl = document.createElement('div');
  bbl.className = 'bbl';
  bbl.textContent = text;

  const time = document.createElement('div');
  time.className = 'ts';
  time.textContent = ts();

  grp.appendChild(sndr);
  grp.appendChild(bbl);
  grp.appendChild(time);
  chatBox.appendChild(grp);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function addSys(text) {
  emptyHint.style.display = 'none';
  const d = document.createElement('div');
  d.className = 'sys';
  d.textContent = text;
  chatBox.appendChild(d);
  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
</body>
</html>
