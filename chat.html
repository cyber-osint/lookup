<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P 보안 채팅 테스트</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 500px; margin: 20px auto; text-align: center; background: #f0f2f5; color: #333; }
        .status-box { background: #007bff; color: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat-box { height: 350px; border: 1px solid #ddd; background: white; overflow-y: auto; padding: 15px; margin-bottom: 10px; text-align: left; border-radius: 8px; display: flex; flex-direction: column; }
        .msg { margin: 5px 0; padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 0.9em; line-height: 1.4; }
        .me { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .peer { background: #e9e9eb; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .system { background: #eee; color: #666; font-size: 0.8em; align-self: center; border-radius: 5px; }
        .input-group { display: flex; gap: 5px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #ccc; outline: none; }
        button { padding: 10px 15px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #connect-btn { background: #17a2b8; }
    </style>
</head>
<body>

    <h2>P2P Private Chat</h2>

    <div class="status-box">
        내 접속 ID: <span id="my-id">연결 중...</span>
    </div>

    <div class="input-group" style="margin-bottom: 20px;">
        <input type="text" id="peer-id-input" placeholder="상대방 ID를 입력하세요">
        <button id="connect-btn">연결하기</button>
    </div>

    <div id="chat-box">
        <div class="msg system">대기 중입니다...</div>
    </div>

    <div class="input-group">
        <input type="text" id="message-input" placeholder="메시지를 입력하세요..." disabled>
        <button id="send-btn" disabled>전송</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const myIdDisplay = document.getElementById('my-id');
        const peerIdInput = document.getElementById('peer-id-input');
        const connectBtn = document.getElementById('connect-btn');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        // [중요] HTTPS 환경 설정을 포함한 Peer 객체 생성
        const peer = new Peer({
            host: '0.peerjs.com',
            port: 443,
            secure: true,
            debug: 3
        });

        let conn;

        // 1. PeerJS 서버 연결 성공 시 내 ID 표시
        peer.on('open', (id) => {
            console.log('연결 성공! 내 ID:', id);
            myIdDisplay.innerText = id;
            addMessage("시스템", "서버 연결 완료. ID가 생성되었습니다.", "system");
        });

        // 2. 상대방으로부터 연결이 왔을 때 (수신)
        peer.on('connection', (connection) => {
            conn = connection;
            setupChat();
            addMessage("시스템", "상대방과 연결되었습니다!", "system");
        });

        // 3. 내가 상대방에게 연결할 때 (발신)
        connectBtn.onclick = () => {
            const peerId = peerIdInput.value.trim();
            if (!peerId) return alert("ID를 입력해주세요.");
            
            addMessage("시스템", peerId + "님께 연결을 시도합니다...", "system");
            conn = peer.connect(peerId);
            setupChat();
        };

        // 4. 공통 채팅 설정 로직
        function setupChat() {
            conn.on('open', () => {
                messageInput.disabled = false;
                sendBtn.disabled = false;
                peerIdInput.disabled = true;
                connectBtn.disabled = true;
            });

            conn.on('data', (data) => {
                addMessage("상대방", data, "peer");
            });

            conn.on('close', () => {
                addMessage("시스템", "연결이 종료되었습니다.", "system");
                messageInput.disabled = true;
                sendBtn.disabled = true;
            });
        }

        // 5. 메시지 전송 로직
        sendBtn.onclick = sendMessage;
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            const msg = messageInput.value.trim();
            if (!msg || !conn) return;
            
            conn.send(msg);
            addMessage("나", msg, "me");
            messageInput.value = "";
        }

        function addMessage(sender, text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = type === 'system' ? text : `<strong>${sender}:</strong> ${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 에러 핸들링
        peer.on('error', (err) => {
            console.error('PeerJS 에러:', err);
            addMessage("시스템", "에러 발생: " + err.type, "system");
        });
    </script>
</body>
</html>
