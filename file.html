<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Relay Mode (Final)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --ok: #32d74b; --err: #ff453a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        .id-badge { font-size: 2rem; font-weight: 800; color: var(--primary); text-align: center; letter-spacing: 3px; margin: 10px 0; padding: 15px; border: 2px solid var(--primary); border-radius: 16px; background: #f0f7ff; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 12px; text-align: center; font-size: 1.1rem; box-sizing: border-box; text-transform: uppercase; }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 1rem; }
        #debug-log { width: 100%; max-width: 400px; background: #1c1c1e; color: var(--ok); font-family: 'Courier New', monospace; font-size: 11px; padding: 15px; border-radius: 12px; margin-top: 20px; height: 250px; overflow-y: auto; white-space: pre-wrap; box-sizing: border-box; line-height: 1.5; border: 1px solid #333; }
        #file-section { margin-top: 20px; display: none; padding-top: 20px; border-top: 1px solid #eee; text-align: center; }
        .download-btn { display: block; margin-top: 12px; padding: 14px; background: var(--ok); color: white; text-decoration: none; border-radius: 12px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="margin:0 0 10px 0; text-align: center;">📡 TURN 중계 모드 (강제)</h3>
    <div id="my-id" class="id-badge">----</div>
    <input type="text" id="target-id" placeholder="상대방 4자리 코드" maxlength="4" oninput="this.value = this.value.toUpperCase()">
    <button id="connect-btn" onclick="connectToPeer()">중계 서버 연결</button>

    <div id="file-section">
        <input type="file" id="file-input" style="font-size: 0.8rem; margin-bottom: 10px;">
        <button onclick="sendFile()" style="background: #1c1c1e;">파일 전송 시작</button>
    </div>
</div>

<div id="debug-log">중계 엔진 초기화 중...</div>

<script>
    const logEl = document.getElementById('debug-log');
    function addLog(msg, color = '#32d74b') {
        const line = document.createElement('div');
        line.style.color = color;
        line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
    }

    const myId = Math.random().toString(36).substring(2, 6).toUpperCase();
    
    // ⚠️ 핵심: P2P 직접 연결을 차단하고 무조건 TURN 서버를 거치도록 설정 (Relay Mode)
    const peer = new Peer(myId, {
        config: {
            'iceServers': [
                {
                    urls: [
                        'turn:openrelay.metered.ca:443',
                        'turn:openrelay.metered.ca:80'
                    ],
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                }
            ],
            // STUN을 무시하고 오직 중계 서버만 사용함
            'iceTransportPolicy': 'relay'
        },
        debug: 1
    });

    let conn;

    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = id;
        addLog(`시스템: 온라인 (ID: ${id})`, '#64d2ff');
        addLog("안내: 현재 중계 서버 모드로 동작 중입니다.");
    });

    peer.on('connection', (connection) => {
        addLog(`[Signal] 상대(${connection.peer})의 접속 요청 수신`, '#64d2ff');
        conn = connection;
        setupEvents();
    });

    function connectToPeer() {
        const targetId = document.getElementById('target-id').value;
        if (!targetId || targetId === myId) return;
        
        addLog(`[Signal] ${targetId}에게 중계 경로 요청 중...`);
        conn = peer.connect(targetId, { 
            reliable: true, 
            serialization: 'binary'
        });
        setupEvents();
    }

    function setupEvents() {
        const pc = conn.peerConnection;

        // 네트워크 경로 수집 로그 (relay가 뜨는지 확인)
        pc.onicecandidate = (e) => {
            if (e.candidate) {
                const type = e.candidate.candidate.split(' ')[7];
                addLog(`🔍 경로 확보: ${type}`, '#888');
            }
        };

        // 연결 상태 실시간 추적
        pc.oniceconnectionstatechange = () => {
            const state = pc.iceConnectionState;
            let color = "#64d2ff";
            if (state === "connected") color = "#32d74b";
            if (state === "failed" || state === "disconnected") color = "#ff453a";
            
            addLog(`📡 연결 상태: ${state.toUpperCase()}`, color);
            
            if (state === "connected") {
                addLog("🚀 중계 서버(Relay) 연결 성공!", "#32d74b");
            }
        };

        conn.on('open', () => {
            document.getElementById('file-section').style.display = 'block';
            document.getElementById('connect-btn').disabled = true;
            addLog("✅ 통로가 열렸습니다. 파일을 전송할 수 있습니다.", "#32d74b");
        });

        conn.on('data', (data) => {
            addLog(`📩 파일 수신: ${data.fileName}`);
            const blob = new Blob([data.file], { type: data.type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.className = 'download-btn'; a.download = data.fileName;
            a.textContent = `⬇️ 다운로드 (${data.fileName})`;
            document.querySelector('.card').appendChild(a);
        });

        conn.on('error', (err) => addLog(`❌ 에러: ${err.type}`, "#ff453a"));
    }

    function sendFile() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        if (!file || !conn.open) return;

        addLog(`📤 전송 시작: ${file.name}`);
        conn.send({ file: file, fileName: file.name, type: file.type });
        addLog("📤 데이터 패킷 전송 완료.");
    }

    peer.on('error', (err) => {
        addLog(`시스템 에러: ${err.type}`, "#ff453a");
    });
</script>

</body>
</html>
