<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Pro Link</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; text-align: center; }
        .id-badge { font-size: 2rem; font-weight: 800; color: var(--primary); letter-spacing: 3px; margin: 10px 0; padding: 10px; border: 2px solid var(--primary); border-radius: 12px; background: #f0f7ff; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; text-align: center; font-size: 1rem; outline: none; }
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        #debug-log { width: 100%; max-width: 400px; background: #1c1c1e; color: #32d74b; font-family: monospace; font-size: 11px; padding: 12px; border-radius: 12px; margin-top: 15px; height: 220px; overflow-y: auto; white-space: pre-wrap; box-sizing: border-box; border: 1px solid #333; }
        #file-section { margin-top: 15px; display: none; padding-top: 15px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="margin:0 0 10px 0">📡 초고속 P2P 전송</h3>
    <div id="my-id" class="id-badge">----</div>
    <input type="text" id="target-id" placeholder="상대방 코드 4자리" maxlength="4" oninput="this.value = this.value.toUpperCase()">
    <button id="connect-btn" onclick="connectToPeer()">연결하기</button>

    <div id="file-section">
        <input type="file" id="file-input">
        <button onclick="sendFile()" style="margin-top:10px; background: #333;">파일 전송 시작</button>
    </div>
</div>

<div id="debug-log">시스템 초기화 중...</div>

<script>
    const logEl = document.getElementById('debug-log');
    function addLog(msg, color = '#32d74b') {
        const line = document.createElement('div');
        line.style.color = color;
        line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
    }

    const myId = Math.random().toString(36).substring(2, 6).toUpperCase();
    
    // 1. 안드로이드 환경에서 연결 성공률을 높이는 핵심 설정
    const peer = new Peer(myId, {
        config: {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun.cloudflare.com:3478' },
                {
                    urls: 'turn:openrelay.metered.ca:443',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                }
            ],
            'iceCandidatePoolSize': 10,
            'sdpSemantics': 'unified-plan'
        }
    });

    let conn;

    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = id;
        addLog(`내 아이디: ${id} (온라인)`);
    });

    // 상대방의 연결 요청을 받았을 때 (수신부)
    peer.on('connection', (connection) => {
        addLog(`[알림] 상대방(${connection.peer})이 전화를 걸었습니다.`, '#64d2ff');
        conn = connection;
        setupPeerEvents();
    });

    // 내가 연결을 시도할 때 (발신부)
    function connectToPeer() {
        const targetId = document.getElementById('target-id').value;
        if (!targetId) return;
        
        addLog(`[시도] ${targetId}에게 신호 보내는 중...`);
        // reliable: true와 함께 암시적 연결 유도를 위해 레이턴시 설정 추가
        conn = peer.connect(targetId, { 
            reliable: true, 
            serialization: 'binary'
        });
        setupPeerEvents();
    }

    function setupPeerEvents() {
        const pc = conn.peerConnection;

        // 네트워크 경로 수집 로그
        pc.oniceconnectionstatechange = () => {
            const s = pc.iceConnectionState;
            addLog(`⚡ 네트워크 상태: ${s.toUpperCase()}`, s === 'connected' ? '#32d74b' : '#ff9f0a');
        };

        conn.on('open', () => {
            addLog("✅ 연결 성공! 이제 파일을 보낼 수 있습니다.", "#32d74b");
            document.getElementById('file-section').style.display = 'block';
            document.getElementById('connect-btn').disabled = true;
        });

        conn.on('data', (data) => {
            addLog(`📂 파일 수신 완료: ${data.fileName}`);
            const blob = new Blob([data.file], { type: data.type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.className = 'download-btn'; a.download = data.fileName;
            a.textContent = `다운로드 (${data.fileName})`;
            a.style = "display:block; margin-top:10px; padding:12px; background:#34c759; color:white; border-radius:10px; text-decoration:none; font-weight:bold; text-align:center;";
            document.querySelector('.card').appendChild(a);
        });

        conn.on('error', (err) => addLog(`❌ 연결 에러: ${err}`, "#ff453a"));
    }

    function sendFile() {
        const file = document.getElementById('file-input').files[0];
        if (!file || !conn.open) return;

        addLog(`📤 전송 중: ${file.name}`);
        conn.send({ file: file, fileName: file.name, type: file.type });
        addLog("📤 전송이 끝났습니다!", "#32d74b");
    }

    peer.on('error', (err) => {
        if(err.type === 'peer-not-found') addLog("❌ 오류: 상대방이 꺼져있거나 코드가 틀립니다.", "#ff453a");
        else addLog(`시스템 에러: ${err.type}`, "#ff453a");
    });
</script>

</body>
</html>
