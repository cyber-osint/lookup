<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global P2P Share Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --success: #34c759; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); width: 90%; max-width: 380px; text-align: center; }
        .id-badge { font-size: 2.2rem; font-weight: 800; color: var(--primary); letter-spacing: 4px; margin: 15px 0; padding: 15px; border: 2px solid var(--primary); border-radius: 12px; cursor: pointer; background: #f0f7ff; transition: 0.2s; }
        .id-badge:active { transform: scale(0.95); background: #e1efff; }
        input[type="text"] { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; text-align: center; font-size: 1.1rem; text-transform: uppercase; font-weight: bold; }
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 0.85rem; color: #86868b; line-height: 1.4; min-height: 40px; }
        #file-section { margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; display: none; }
        .download-btn { display: block; margin-top: 15px; padding: 12px; background: var(--success); color: white; text-decoration: none; border-radius: 10px; font-weight: bold; box-shadow: 0 4px 10px rgba(52, 199, 89, 0.3); }
        .progress-bar { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 10px; overflow: hidden; display: none; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">📡 글로벌 전송</h2>
    <p style="font-size: 0.8rem; color: #666;">내 코드 (클릭하여 주소 복사)</p>
    <div id="my-id" class="id-badge" onclick="copyLink()">----</div>
    
    <input type="text" id="target-id" placeholder="상대방 4자리 코드" maxlength="4" oninput="this.value = this.value.toUpperCase()">
    <button id="connect-btn" onclick="connectToPeer()">연결하기</button>

    <div id="status">네트워크 초기화 중...</div>
    <div class="progress-bar" id="p-bar"><div class="progress-fill" id="p-fill"></div></div>

    <div id="file-section">
        <input type="file" id="file-input">
        <button id="send-btn" onclick="sendFile()" style="margin-top:15px; background: #1c1c1e;">파일 전송</button>
    </div>
</div>

<script>
    // 1. 고유 ID 생성 (4자리)
    const myId = Math.random().toString(36).substring(2, 6).toUpperCase();
    
    // 2. STUN/TURN 설정 (외부망 연결 핵심)
    const peer = new Peer(myId, {
        config: {
            'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' },
                {
                    urls: 'turn:openrelay.metered.ca:443',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                }
            ],
            'iceCandidatePoolSize': 10
        },
        debug: 1 // 에러 로그만 출력
    });

    let conn;

    // 초기화 완료
    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = id;
        document.getElementById('status').innerText = "대기 중... 코드를 공유하세요.";
        
        // 자동 조인 체크
        const urlParams = new URLSearchParams(window.location.search);
        const joinId = urlParams.get('join');
        if (joinId && joinId.toUpperCase() !== myId) {
            document.getElementById('target-id').value = joinId.toUpperCase();
            setTimeout(connectToPeer, 1000);
        }
    });

    // 상대방의 연결 요청 수신
    peer.on('connection', (connection) => {
        conn = connection;
        setupEvents();
    });

    // 내가 연결 시도
    function connectToPeer() {
        const targetId = document.getElementById('target-id').value.toUpperCase();
        if (!targetId || targetId === myId) return;
        
        document.getElementById('status').innerText = "상대방 찾는 중 (STUN/TURN)...";
        
        // 옵션 최적화: binary 직렬화로 속도 향상
        conn = peer.connect(targetId, { 
            reliable: true,
            serialization: 'binary' 
        });
        setupEvents();
    }

    // 연결 후 이벤트 핸들링
    function setupEvents() {
        conn.on('open', () => {
            document.getElementById('status').innerText = "✅ 연결됨! 파일을 보낼 수 있습니다.";
            document.getElementById('file-section').style.display = 'block';
            document.getElementById('connect-btn').disabled = true;
            document.getElementById('target-id').disabled = true;
        });

        conn.on('data', (data) => {
            // 파일 수신 로직 (Blob 형태)
            if (data && data.file) {
                const blob = new Blob([data.file], { type: data.type });
                const url = URL.createObjectURL(blob);
                document.getElementById('status').innerHTML = 
                    `<a href="${url}" download="${data.fileName}" class="download-btn">⬇️ 다운로드: ${data.fileName}</a>`;
                hideProgress();
            }
        });

        conn.on('close', () => {
            alert("연결이 종료되었습니다.");
            location.reload();
        });

        conn.on('error', (err) => {
            console.error("Conn Error:", err);
            document.getElementById('status').innerText = "연결 오류가 발생했습니다.";
        });
    }

    // 파일 전송 로직
    function sendFile() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        if (!file) return alert("파일을 선택하세요.");

        // 파일 크기 체크 (PeerJS 직렬화 한계로 인해 약 100MB 권장)
        if (file.size > 100 * 1024 * 1024) {
            alert("100MB 이상의 파일은 전송이 불안정할 수 있습니다.");
        }

        document.getElementById('status').innerText = "파일 전송 중...";
        showProgress();

        // 파일 전송 실행
        conn.send({
            file: file,
            fileName: file.name,
            type: file.type
        });

        // PeerJS는 데이터 전송 완료 시점을 콜백으로 주지 않으므로 가상 게이지 처리
        let p = 0;
        const interval = setInterval(() => {
            p += 10;
            document.getElementById('p-fill').style.width = p + "%";
            if (p >= 100) {
                clearInterval(interval);
                document.getElementById('status').innerText = "전송 완료!";
                setTimeout(hideProgress, 2000);
            }
        }, 100);
    }

    function showProgress() {
        document.getElementById('p-bar').style.display = 'block';
        document.getElementById('p-fill').style.width = '0%';
    }

    function hideProgress() {
        document.getElementById('p-bar').style.display = 'none';
    }

    function copyLink() {
        const link = `${window.location.origin}${window.location.pathname}?join=${myId}`;
        navigator.clipboard.writeText(link).then(() => {
            const status = document.getElementById('status');
            const originalText = status.innerText;
            status.innerText = "📋 주소가 복사되었습니다!";
            setTimeout(() => status.innerText = originalText, 2000);
        });
    }

    peer.on('error', (err) => {
        let msg = "오류 발생";
        if(err.type === 'peer-not-found') msg = "상대방을 찾을 수 없습니다.";
        if(err.type === 'unavailable-id') msg = "ID가 중복되었습니다. 다시 시도하세요.";
        document.getElementById('status').innerText = "❌ " + msg;
        console.error("Peer Error Type:", err.type);
    });
</script>

</body>
</html>
