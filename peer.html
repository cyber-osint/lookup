<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PeerJS 디버깅 테스트</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        video { width: 200px; background: #000; border-radius: 8px; margin: 10px; }
        .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <h2>PeerJS 상태 체크</h2>

    <div class="box">
        <strong>내 ID:</strong> <span id="my-id">연결 중...</span>
    </div>

    <div class="box">
        <input type="text" id="peer-id" placeholder="상대방 ID 입력">
        <button id="call-btn">영상통화 걸기</button>
    </div>

    <div>
        <video id="local-video" autoplay muted playsinline></video>
        <video id="remote-video" autoplay playsinline></video>
    </div>

    <script>
        const myIdDisplay = document.getElementById('my-id');
        const peerIdInput = document.getElementById('peer-id');
        const callBtn = document.getElementById('call-btn');
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');

        const peer = new Peer(); 
        let localStream = null;

        // [수정] 카메라/마이크 시도 (실패해도 에러로 멈추지 않음)
        async function initMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                console.log("카메라 연결 성공");
            } catch (err) {
                console.error("카메라를 찾을 수 없습니다:", err.name);
                alert("카메라나 마이크를 찾을 수 없습니다. 장치를 연결하거나 권한을 확인해 주세요.");
            }
        }

        initMedia();

        peer.on('open', (id) => {
            myIdDisplay.innerText = id;
        });

        // 전화 받기 루틴
        peer.on('call', (call) => {
            if (!localStream) {
                alert("내 카메라가 없어서 받을 수 없습니다.");
                return;
            }
            call.answer(localStream);
            call.on('stream', (remoteStream) => {
                remoteVideo.srcObject = remoteStream;
            });
        });

        // [수정] 전화 걸기 버튼 클릭 시 안전 장치 추가
        callBtn.onclick = () => {
            const remotePeerId = peerIdInput.value;
            if (!remotePeerId) return alert("상대방 ID를 입력하세요.");
            if (!localStream) return alert("카메라 장치가 준비되지 않았습니다.");

            const call = peer.call(remotePeerId, localStream);
            
            if (call) {
                call.on('stream', (remoteStream) => {
                    remoteVideo.srcObject = remoteStream;
                });
            }
        };

        // 에러 핸들링 추가
        peer.on('error', (err) => {
            console.error("PeerJS 에러 발생:", err.type);
            alert("에러 발생: " + err.type);
        });
    </script>
</body>
</html>
